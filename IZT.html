const vKey = 'IZT GmbH';
let cardCount = 0;

function tog(id){
  const c=document.getElementById('pc'+id), t=document.getElementById('pt'+id);
  const o=c.classList.toggle('open'); t.textContent=o?'−':'+';
}

function render(){
  document.title = vKey + ' – Western Systems Technologies LLP';
  document.getElementById('ptitle').textContent = vKey + ' – Western Systems Technologies LLP';

  const statsHTML = V.stats.map(s=>`<div class="stat"><div class="stat-val">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');

  const appsHTML = V.apps.map(a=>`<div class="app-card"><div class="app-icon">${a.icon}</div><div class="app-name">${a.name}</div><div class="app-desc">${a.desc}</div></div>`).join('');
  const prodsHTML = V.products.map((p,i)=>{
    const id = cardCount++;
    return `<div class="prod-card" id="pc${id}" onclick="tog(${id})" style="animation-delay:${i*0.07}s">
      <div class="prod-head"><div class="prod-name">${p.name}</div><div class="tog" id="pt${id}">+</div></div>
      <div class="prod-brief">${p.brief}</div>
      <div class="pills">${p.pills.map(pl=>`<span class="pill">${pl}</span>`).join('')}</div>
      <div class="detail">
        <div class="dl"><div class="dl-label">Overview</div><div class="dl-text">${p.desc.replace(/\n/g,'<br>')}</div></div>
        ${p.specs.length?`<div class="dl"><div class="dl-label">Key Specifications</div><table class="stbl">${p.specs.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table></div>`:''}
        ${p.parts.length?`<div class="dl"><div class="dl-label">Models / Products</div><div class="pnums">${p.parts.map(pt=>`<span class="pnum">${pt}</span>`).join('')}</div></div>`:''}
        <div class="dl"><div class="dl-label">Typical Applications</div><div class="dl-text">${p.app}</div></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('root').innerHTML = `
    <div class="hero">
      <div>
        <div class="hero-domain">// RF & MICROWAVE · SIGNAL INTELLIGENCE & TEST SYSTEMS</div>
        <div class="hero-name">${vKey}</div>

    </div>

    <div class="sec"><div class="sec-title">Product Lines & Solutions</div><div class="prod-grid">${prodsHTML}</div></div>
    <div class="sec"><div class="sec-title">Key Applications</div><div class="apps-grid">${appsHTML}</div></div>
    <div class="contact-bar">

      </div>

}
