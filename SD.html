  const prodsHTML=V.products.map((p,i)=>{const id=cc++;return`<div class="prod-card" id="pc${id}" onclick="tog(${id})" style="animation-delay:${i*0.07}s"><div class="prod-head"><div class="prod-name">${p.name}</div><div class="tog" id="pt${id}">+</div></div><div class="prod-brief">${p.brief}</div><div class="pills">${p.pills.map(pl=>`<span class="pill">${pl}</span>`).join('')}</div><div class="detail"><div class="dl"><div class="dl-label">Overview</div><div class="dl-text">${p.desc.replace(/\n/g,'<br>')}</div></div>${p.specs&&p.specs.length?`<div class="dl"><div class="dl-label">Key Specifications</div><table class="stbl">${p.specs.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table></div>`:''}<div class="dl"><div class="dl-label">Models / Products</div><div class="pnums">${p.parts.map(pt=>`<span class="pnum">${pt}</span>`).join('')}</div></div><div class="dl"><div class="dl-label">Typical Applications</div><div class="dl-text">${p.app}</div></div></div></div>`;}).join('');
  document.getElementById('root').innerHTML=`
    <div class="hero"><div>
      <div class="hero-domain">// TIME & FREQUENCY</div>
      <div class="hero-name">${vKey}</div>
      <div class="hero-sub">${V.sub}</div>
      <div class="hero-country">▸ ${V.country}${V.founded?' &nbsp;·&nbsp; FOUNDED '+V.founded:''}</div>
      <div class="hero-desc">${V.desc}</div>
      <a href="${V.url}" target="_blank" class="hero-link">↗ VISIT OFFICIAL WEBSITE</a>
    </div><div class="badges">${badgesHTML}</div></div>
    ${statsHTML?`<div class="stats-bar">${statsHTML}</div>`:''}
    <div class="sec"><div class="sec-title">Product Lines & Solutions</div><div class="prod-grid">${prodsHTML}</div></div>
    ${appsHTML?`<div class="sec"><div class="sec-title">Key Applications</div><div class="apps-grid">${appsHTML}</div></div>`:''}
    <div class="contact-bar">
      <div><div class="c-title">REQUEST INFORMATION OR QUOTE</div><div class="c-sub">Contact ${vKey} for datasheets, pricing and technical support</div></div>
      <div><div class="c-lbl">EMAIL</div><a class="c-email" href="mailto:${V.email}">${V.email}</a></div>
    </div>
    <div class="wst-footer">
      <div><div class="wst-name">WESTERN SYSTEMS TECHNOLOGIES LLP</div><div class="wst-sub">BANGALORE, INDIA &nbsp;·&nbsp; RF & MICROWAVE · TIME & FREQUENCY · OPTICS & LASER</div></div>
      <div class="wst-tag">AUTHORISED REPRESENTATIVE &nbsp;·&nbsp; ${vKey}</div>
    </div>`;
}
render();
</script></body></html>
