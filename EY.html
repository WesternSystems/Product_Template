<script>
const FAMILIES = [
  {
    name: 'SINGLE FREQUENCY LASER DIODES',
    brief: 'DFB, DBR, and RWS laser diodes delivering a single longitudinal mode with ultra-narrow linewidth. Ideal for precision spectroscopy, quantum technology and atomic clock applications.',
    pills: ['760–1083 nm', '12–500 mW CW', 'Linewidth < 1 MHz', '≥30 dB SMSR'],
    desc: 'Single frequency laser diodes emit in a single longitudinal mode defined by the grating structure built into the chip. DFB (Distributed Feedback) lasers use a periodic grating along the full active region. DBR (Distributed Bragg Reflector) lasers incorporate a passive grating section outside the gain region. RWS lasers use a ridge waveguide with short cavity for single-mode operation.',
    specs: [
      ['Wavelength Range', '760 nm to 1083 nm'],
      ['Output Power', '12 mW to 500 mW (CW)'],
      ['Typical Linewidth', '< 1 MHz (DFB/DBR)'],
      ['Side Mode Suppression', '≥ 30 dB'],
      ['Threshold Current', '≤ 70 mA'],
      ['Slope Efficiency', '0.7 W/A (typ.)'],
      ['Operating Temperature', '10°C to 40°C (with TEC)'],
      ['Package', 'Butterfly (BFW, BFY), TO-can (TOC, TOV)']
    ],
    parts: ['EYP-DFB-0760-xxxxx', 'EYP-DFB-0780-xxxxx', 'EYP-DFB-0795-xxxxx', 'EYP-DFB-0852-xxxxx', 'EYP-DFB-1064-xxxxx', 'EYP-ECL-0770-xxxxx', 'EYP-ECL-0795-xxxxx', 'EYP-RWS-0780-xxxxx'],
    app: 'Atomic clocks, Rb/Cs/K spectroscopy, cold atom interferometry, quantum optics, metrology, THz generation seed laser, LIDAR seed laser, interferometry'
  },
  {
    name: 'TAPERED AMPLIFIERS',
    brief: 'High-brightness, diffraction-limited beam amplification using a tapered active region. Delivers high CW output power with excellent beam quality from a single-spatial-mode input.',
    pills: ['650–980 nm', '250 mW–3 W CW', 'Diffraction limited', 'C-Mount / Butterfly'],
    desc: 'Tapered amplifiers (TPA) are seeded by a narrow-linewidth single-frequency laser diode. The tapered gain section expands the beam laterally to achieve high output power while maintaining the spectral properties of the seed laser. The miniTA product is a highly integrated fiber-pigtailed version for plug & play use.',
    specs: [
      ['Wavelength Range', '650 nm to 980 nm'],
      ['Output Power', '250 mW to 3 W (CW)'],
      ['Beam Quality', 'Diffraction-limited (M² ≈ 1)'],
      ['Seed Power Required', '10–100 mW typical'],
      ['Package', 'C-Mount (CMT), BTU Butterfly'],
      ['Typical Gain', '20–30 dB'],
      ['Operating Current', 'Up to 4 A']
    ],
    parts: ['EYP-TPA-0650-00250', 'EYP-TPA-0670-00500', 'EYP-TPA-0765-02000', 'EYP-TPA-0780-03000', 'EYP-TPA-0795-02000', 'EYP-TPA-0808-02000', 'EYP-TPA-0850-02000', 'EYP-TPA-0895-02500', 'EYP-TPA-0980-00500'],
    app: 'Bose-Einstein condensate research, cold atom trapping, atom interferometry, quantum computing, optical pumping, high-power spectroscopy'
  },
  {
    name: 'SINGLE MODE LASER DIODES',
    brief: 'Fabry-Pérot RWL ridge waveguide laser diodes offering single spatial mode with up to 800 mW CW output. Available in hermetically sealed packages for long-term reliability.',
    pills: ['808–1060 nm', 'Up to 800 mW CW', 'Single spatial mode', 'Hermetic packages'],
    desc: 'Single mode laser diodes (RWL) are ridge waveguide Fabry-Pérot laser diodes with a narrow ridge defining the lateral mode. They are not single-frequency but emit with a single transverse (spatial) mode, providing excellent beam quality for fiber coupling and precision optics applications. The 400 mW and 800 mW variants are standout products in this family.',
    specs: [
      ['Wavelength Range', '808 nm to 1060 nm'],
      ['Output Power', '100 mW to 800 mW (CW)'],
      ['Spatial Mode', 'Single transverse mode'],
      ['Spectral Width', 'Multi-longitudinal mode'],
      ['Package', 'SOT, Butterfly (BFY02), Flatpack (FLW)'],
      ['Operating Current', 'Up to 1 A'],
      ['Reliability', 'Hermetically sealed (Hi-Rel)']
    ],
    parts: ['EYP-RWL-0808-00400-BFY02', 'EYP-RWL-0808-00800-BFW09', 'EYP-RWL-0850-00100', 'EYP-RWL-1060-00100', 'EYP-RWL-1060-00750'],
    app: 'Nd:YAG pumping, fiber laser seeding, material processing seed, sensing, optical tweezers, inter/intra-satellite communication (space-qualified)'
  },
  {
    name: 'MULTIMODE LASER DIODES (BAL)',
    brief: 'Broad Area Laser (BAL) diodes delivering very high optical power (1 W to 8 W CW) from a wide emitting aperture. Designed for maximum power density and pump applications.',
    pills: ['653–1064 nm', '1 W–8 W CW', 'Broad area emitter', 'CW and Pulsed'],
    desc: 'Broad Area Laser diodes (BAL) use a wide emitting aperture (typically 100–200 µm) to produce high optical power. They are multimode both spectrally and spatially. Available in both CW and pulsed configurations. Packaged in reliable C-Mount and SOT formats for efficient thermal management. Used widely as pump sources for solid-state and fiber lasers.',
    specs: [
      ['Wavelength Range', '653 nm to 1064 nm'],
      ['Output Power', '1 W to 8 W (CW)'],
      ['Emitter Width', '100–200 µm (broad area)'],
      ['Operating Mode', 'CW and Pulsed'],
      ['Package', 'C-Mount (CMT04), SOT23'],
      ['Pulsed Peak Power', 'Up to 20 W'],
      ['Thermal Resistance', 'Low (C-Mount direct mounting)']
    ],
    parts: ['EYP-BAL-0808-00020', 'EYP-BAL-0808-08000', 'EYP-BAL-0905-00090', 'EYP-BAL-0980-08000', 'EYP-BAL-1064-08000', 'EYP-BAL-0653-01000', 'EYP-BAL-0670-00001'],
    app: 'Solid-state laser pumping, Nd:YAG / Nd:YVO₄ pumping, fiber laser pumping, material processing, illumination, medical (ophthalmology, dental), direct diode applications'

  {

    pills: ['655–1060 nm', '20–100 mW', 'AR-coated facet', 'ECDL ready'],
    desc: 'Gain chips are ridge waveguide laser diodes with a high-quality anti-reflection (AR) coating on the output facet. When placed in an external cavity with a grating or mirror, they form a tunable, narrow-linewidth external cavity diode laser (ECDL). EagleYard gain chips are recognized for their low threshold current, high gain and excellent AR coating quality (<0.1% residual reflectivity).',
    specs: [
      ['Wavelength Range', '655 nm to 1060 nm'],
      ['Output Power', '20 mW to 100 mW (in cavity)'],
      ['AR Coating Reflectivity', '< 0.1%'],
      ['Package', 'SOT02 (open, no window)'],
      ['Ridge Width', '3–4 µm typical'],
      ['Threshold Current', '15–40 mA'],
      ['Applications', 'ECDL, external resonator tunable laser']
    ],
    parts: ['EYP-RWE-0655-00505', 'EYP-RWE-0670-00703', 'EYP-RWE-0690-00703', 'EYP-RWE-0760-02010', 'EYP-RWE-0790-03010', 'EYP-RWE-0840-06010', 'EYP-RWE-0980-08020', 'EYP-RWE-1060-10020'],
    app: 'Tunable laser research, ECDL systems, atomic & molecular spectroscopy, Littrow / Littman-Metcalf external cavity configurations, laser cooling and trapping'

const APPS = [
  { icon: '⚛', name: 'ATOMIC CLOCK', desc: 'DFB lasers at Rb, Cs, K transition wavelengths for optically pumped atomic clock references' },
  { icon: '🔬', name: 'SPECTROSCOPY', desc: 'Narrow linewidth DFB/ECL lasers for absorption spectroscopy of gases and atomic transitions' },
  { icon: '🌡', name: 'METROLOGY', desc: 'Optical frequency standards, iodine-stabilized lasers, length and time metrology' },
  { icon: '🛰', name: 'SPACE / SATELLITE', desc: 'Space-qualified laser diodes for inter/intra-satellite laser communication (LISA mission)' },
  { icon: '❄', name: 'COLD ATOMS', desc: 'Laser cooling and trapping, Bose-Einstein condensate, atom interferometry' },
  { icon: '🔭', name: 'LIDAR', desc: 'Seed lasers for pulsed high-power LIDAR systems for atmospheric and range-finding applications' },
  { icon: '🌊', name: 'THz GENERATION', desc: 'Photomixing of two DFB lasers for continuous-wave THz source generation' },
  { icon: '⚡', name: 'QUANTUM TECH', desc: 'Quantum computing, quantum communication, entanglement experiments' },
  { icon: '🔎', name: 'GAS DETECTION', desc: 'TDLAS (Tunable Diode Laser Absorption Spectroscopy) for trace gas sensing and analysis' },
  { icon: '🏭', name: 'MATERIAL PROCESSING', desc: 'High-power seed lasers for fiber amplifiers and solid-state laser pump sources' },
  { icon: '🏥', name: 'MEDICAL / DENTAL', desc: 'High-power BAL diodes for ophthalmology and dental treatment applications' },
  { icon: '🎯', name: 'SENSING / RANGING', desc: 'Velocimetry, interferometry, laser Doppler vibrometry and distance measurement' }
];

const PACKAGES = [
  { name: 'BUTTERFLY (BFW / BFY)', desc: '14-pin hermetically sealed butterfly package with integrated TEC and thermistor. Ideal for spectroscopy and metrology.' },
  { name: 'TO-CAN (TOV / TOC)', desc: 'Compact TO-package with collimation optics. Suitable for space-constrained system integration.' },
  { name: 'C-MOUNT (CMT)', desc: 'High-power C-mount package for efficient heat dissipation. Used in tapered amplifiers and broad-area lasers.' },
  { name: 'FLATPACK (FLW)', desc: 'Low-profile flatpack for space-qualified and high-reliability laser diode applications.' },
  { name: 'SOT PACKAGE (SOT)', desc: 'Small outline transistor package. Used for gain chips and AR-coated laser diodes in ECDL setups.' },
  { name: 'MINI ECL (BFY12)', desc: 'Plug & play fiber-pigtailed butterfly package with integrated optical isolator. Minimal setup complexity.' }
];

let cc = 0;

function tog(id) {
  const c = document.getElementById('pc'+id), t = document.getElementById('pt'+id);
  const o = c.classList.toggle('open'); t.textContent = o ? '\u2212' : '+';
}

function render() {
  // HERO
  const heroHTML = `
    <div class="hero">
      <div>
        <div class="hero-domain">// OPTICS &amp; LASER &nbsp;·&nbsp; PHOTONICS</div>
        <div class="hero-name">EAGLEYARD PHOTONICS</div>
        <div class="hero-sub">HIGH-POWER LASER DIODES — GaAs TECHNOLOGY</div>
        <div class="hero-country">&#9658; BERLIN, GERMANY &nbsp;·&nbsp; FOUNDED 2002 &nbsp;·&nbsp; NOW: TOPTICA EAGLEYARD</div>
        <div class="hero-desc">Global leading provider of high-power laser diodes with wavelengths from 630–1120 nm based on GaAs (Gallium Arsenide). Products combine maximum power, highest durability and excellent beam quality — engineered for the most demanding high-end scientific, defence, space and industrial applications worldwide.</div>
        <a href="https://www.toptica-eagleyard.com" target="_blank" rel="noopener" class="hero-link">&#8599; VISIT OFFICIAL WEBSITE</a>
      </div>
      <div class="badges">
        <div class="badge">630–1120 nm</div>
        <div class="badge">GaAs TECHNOLOGY</div>
        <div class="badge">SPACE QUALIFIED</div>
        <div class="badge">5 PRODUCT FAMILIES</div>
        <div class="badge">ISO CERTIFIED</div>
      </div>
    </div>`;

  // STATS
  const statsHTML = `
    <div class="stats-bar">
      <div class="stat"><div class="stat-val">5</div><div class="stat-label">PRODUCT FAMILIES</div></div>
      <div class="stat"><div class="stat-val">630–1120nm</div><div class="stat-label">WAVELENGTH RANGE</div></div>
      <div class="stat"><div class="stat-val">8W</div><div class="stat-label">MAX CW POWER (BAL)</div></div>
      <div class="stat"><div class="stat-val">GaAs</div><div class="stat-label">CORE TECHNOLOGY</div></div>
    </div>`;

  // PRODUCTS
  const prodsHTML = FAMILIES.map((p, i) => {
    const id = cc++;
    const specsHTML = p.specs && p.specs.length
      ? `<div class="dl"><div class="dl-label">Key Specifications</div><table class="stbl">${p.specs.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table></div>` : '';

      <div class="prod-brief">${p.brief}</div>
      <div class="pills">${p.pills.map(pl => `<span class="pill">${pl}</span>`).join('')}</div>
      <div class="detail">
        <div class="dl"><div class="dl-label">Overview</div><div class="dl-text">${p.desc}</div></div>

  // APPS
  const appsHTML = APPS.map(a =>

  // PACKAGES

}
